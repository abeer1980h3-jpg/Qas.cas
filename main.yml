name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create Base Web Directory
      run: |
        mkdir -p www
        cp index.html www/index.html || cp index2.html www/index.html || echo "No index file found"

    - name: Install Dependencies
      run: npm install

    - name: Update Capacitor Config
      run: |
        echo '{"appId": "com.idcropper.app", "appName": "قص الهويات", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json

    - name: Sync Web Code to Android
      run: npx cap sync android

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
